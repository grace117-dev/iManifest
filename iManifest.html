<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manifest Flow | 顯化流日誌</title>
    
    <!-- PWA Web Manifest (Base64 內聯處理) -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk1hbmlmZXN0IEZsb3cg6aGv5YyW5rWBIiwKICAic2hvcnRfbmFtZSI6ICLpoG/ljlbmtWIiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiI0ZERkNGQiIsCiAgInRoZW1lX2NvbG9yIjogIiM2MzY2ZjEiCn0=">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            background-color: #FDFCFB;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 隱藏捲軸但保持滾動 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="app" class="min-h-screen p-5 pb-10">
        <!-- 頂部導航 -->
        <nav class="max-w-md mx-auto flex justify-between items-center mb-8 pt-4">
            <div class="flex items-center gap-2">
                <i data-lucide="sparkles" class="text-indigo-600 animate-pulse"></i>
                <h1 class="text-xl font-bold tracking-tight text-indigo-900">Manifest Flow</h1>
            </div>
            <div id="status-tag" class="text-[10px] font-bold px-3 py-1 bg-indigo-50 text-indigo-500 rounded-full uppercase tracking-widest transition-all duration-500">
                Connected
            </div>
        </nav>

        <main class="max-w-md mx-auto space-y-8">
            <!-- 意圖區塊 -->
            <section>
                <label class="flex items-center gap-2 text-sm font-semibold text-slate-400 mb-3 ml-1">
                    <i data-lucide="check-circle-2" size="16"></i> 核心意圖 (已完成式)
                </label>
                <textarea id="manifest-input" 
                    class="w-full h-44 p-6 rounded-[2rem] bg-white border-none shadow-[0_20px_50px_-20px_rgba(0,0,0,0.05)] focus:ring-4 focus:ring-indigo-50 transition-all text-lg leading-relaxed placeholder:text-slate-200 resize-none"
                    placeholder="我非常感恩，因為我已經擁有..."></textarea>
            </section>

            <!-- 感謝區塊 -->
            <section>
                <label class="flex items-center gap-2 text-sm font-semibold text-slate-400 mb-3 ml-1">
                    <i data-lucide="heart" size="16" class="text-rose-300"></i> 豐盛清單 (高頻對頻)
                </label>
                <textarea id="gratitude-input" 
                    class="w-full h-44 p-6 rounded-[2rem] bg-white border-none shadow-[0_20px_50px_-20px_rgba(0,0,0,0.05)] focus:ring-4 focus:ring-rose-50 transition-all text-lg leading-relaxed placeholder:text-slate-200 resize-none"
                    placeholder="謝謝宇宙，今天發生的好事有..."></textarea>
            </section>

            <!-- 操作區 -->
            <div class="grid grid-cols-5 gap-3">
                <button onclick="saveData()" 
                    class="col-span-4 bg-indigo-600 text-white py-5 rounded-3xl font-bold shadow-xl shadow-indigo-100 active:scale-95 transition-all flex items-center justify-center gap-3 text-lg">
                    <i data-lucide="save" size="20"></i> 鎖定能量狀態
                </button>
                <button onclick="clearData()" 
                    class="col-span-1 bg-white text-slate-300 rounded-3xl flex items-center justify-center active:bg-rose-50 active:text-rose-400 transition-colors border border-slate-50">
                    <i data-lucide="trash-2" size="20"></i>
                </button>
            </div>
        </main>

        <!-- 底部金句 -->
        <footer class="max-w-md mx-auto mt-16 p-8 rounded-[2.5rem] bg-gradient-to-br from-indigo-50/50 to-purple-50/50 text-center border border-white">
            <p id="quote" class="text-sm text-indigo-800 italic leading-relaxed">
                "你所尋求的，也正在尋求你。"
            </p>
        </footer>
    </div>

    <script>
        // 初始化圖標
        lucide.createIcons();

        const manifestInput = document.getElementById('manifest-input');
        const gratitudeInput = document.getElementById('gratitude-input');
        const statusTag = document.getElementById('status-tag');

        // 載入資料
        window.onload = () => {
            const saved = localStorage.getItem('manifest_v1');
            if (saved) {
                const data = JSON.parse(saved);
                manifestInput.value = data.manifest || "";
                gratitudeInput.value = data.gratitude || "";
            }
        };

        // 儲存功能
        function saveData() {
            const data = {
                manifest: manifestInput.value,
                gratitude: gratitudeInput.value,
                timestamp: new Date().getTime()
            };
            localStorage.setItem('manifest_v1', JSON.stringify(data));
            
            // UI 反饋
            statusTag.innerText = "能量已同步 ✨";
            statusTag.classList.replace('bg-indigo-50', 'bg-green-50');
            statusTag.classList.replace('text-indigo-500', 'text-green-600');

            // 手機震動
            if (navigator.vibrate) navigator.vibrate(50);

            setTimeout(() => {
                statusTag.innerText = "Connected";
                statusTag.classList.replace('bg-green-50', 'bg-indigo-50');
                statusTag.classList.replace('text-green-600', 'text-indigo-500');
            }, 2000);
        }

        // 清除功能
        function clearData() {
            if (confirm("確定要重置今天的顯化頻率嗎？")) {
                manifestInput.value = "";
                gratitudeInput.value = "";
                localStorage.removeItem('manifest_v1');
            }
        }

        // 自動儲存 (每 30 秒)
        setInterval(() => {
            if (manifestInput.value || gratitudeInput.value) {
                const data = {
                    manifest: manifestInput.value,
                    gratitude: gratitudeInput.value,
                    timestamp: new Date().getTime()
                };
                localStorage.setItem('manifest_v1', JSON.stringify(data));
            }
        }, 30000);

        // 註冊 Service Worker (PWA 核心)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ZW50ID0+IHsgfSk7').then(reg => {
                    console.log('SW registered');
                }).catch(err => {
                    console.log('SW registration failed');
                });
            });
        }
    </script>
</body>
</html>
