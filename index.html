<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Align Journal v2.0 | 靈魂手寫板</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Serif+TC:wght@400;600&family=Zhi+Mang+Xing&display=swap');
        
        :root {
            --paper: #fdfaf3;
            --ink: #334155;
            --line: rgba(212, 204, 185, 0.5);
            --seal: #991b1b;
        }

        body {
            background: #d1d5db;
            /* 模擬桌面紋理 */
            background-image: radial-gradient(#9ca3af 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            font-family: 'Noto Serif TC', serif;
            overflow-x: hidden;
        }

        /* 手帳外殼優化：加入皮革質感 */
        .journal-container {
            background: #2d3436;
            border-radius: 16px 24px 24px 16px;
            box-shadow: 
                20px 20px 60px rgba(0,0,0,0.3),
                inset -5px 0 10px rgba(255,255,255,0.05);
            position: relative;
            border-left: 12px solid #1e272e;
        }

        /* 紙張紋理優化 */
        .page {
            background-color: var(--paper);
            background-image: 
                linear-gradient(var(--line) 1px, transparent 1px),
                url('https://www.transparenttextures.com/patterns/cream-paper.png');
            background-size: 100% 32px, auto;
            background-attachment: local;
            line-height: 32px;
            padding: 40px;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.02);
        }

        .spine {
            width: 50px;
            background: linear-gradient(to right, #2d3436, #3d4446 20%, #2d3436 50%, #3d4446 80%, #2d3436);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* 手寫輸入框 */
        .ink-text {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Caveat', 'Noto Serif TC', serif;
            font-size: 20px;
            color: var(--ink);
            resize: none;
            padding-top: 4px; /* 對齊橫線 */
        }

        /* 封蠟章按鈕樣式 */
        .seal-button {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .seal-button:active {
            transform: scale(0.9) rotate(-5deg);
        }

        /* 成功儲存的印記動畫 */
        @keyframes stamp {
            0% { transform: scale(5); opacity: 0; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .stamped {
            animation: stamp 0.3s ease-out forwards;
        }

        @media (max-width: 768px) {
            .journal-container { border-left: none; border-radius: 0; }
            .spine { display: none; }
            .page-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-6xl">
        <!-- 工具列 -->
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-red-900 rounded-full flex items-center justify-center shadow-lg border-2 border-red-800 seal-button cursor-pointer" onclick="save()">
                    <i data-lucide="award" class="text-amber-200"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 tracking-widest font-serif uppercase">Align Journal</h1>
                    <p id="date" class="text-xs text-slate-500 font-mono"></p>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="clearAll()" class="text-slate-400 hover:text-red-600 transition-colors">
                    <i data-lucide="eraser" size="20"></i>
                </button>
            </div>
        </div>

        <!-- 手帳本體 -->
        <div class="journal-container overflow-hidden">
            <div class="page-wrapper flex min-h-[75vh]">
                
                <!-- 左頁：意圖 -->
                <div class="page flex-1 relative">
                    <div class="flex items-center justify-between mb-8">
                        <span class="text-sm font-bold text-slate-400 italic">Intentions // 意圖</span>
                        <i data-lucide="feather" class="text-slate-300 w-4 h-4"></i>
                    </div>
                    <textarea id="m-input" class="ink-text" placeholder="親愛的宇宙，我已經準備好接收..."></textarea>
                </div>

                <!-- 書脊 -->
                <div class="spine"></div>

                <!-- 右頁：感謝 -->
                <div class="page flex-1 relative">
                    <div class="flex items-center justify-between mb-8">
                        <span class="text-sm font-bold text-slate-400 italic">Gratitude // 豐盛</span>
                        <span class="text-[10px] text-slate-300 font-mono">2026 EDITION</span>
                    </div>
                    <textarea id="g-input" class="ink-text" placeholder="謝謝你，讓這一切自然而然地發生..."></textarea>
                    
                    <!-- 儲存成功時顯示的印章印記 (隱藏) -->
                    <div id="save-seal" class="absolute bottom-10 right-10 opacity-0 pointer-events-none">
                        <div class="w-20 h-20 border-4 border-red-800/30 rounded-full flex items-center justify-center text-red-800/30 font-bold rotate-[-20deg] text-xs">
                            ALIGN VERIFIED
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- 頁碼 -->
        <div class="mt-6 flex justify-center gap-10 text-[10px] text-slate-500 font-mono tracking-[0.2em]">
            <span>L-PAGE.07</span>
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-indigo-400"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
            </div>
            <span>R-PAGE.08</span>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const mInput = document.getElementById('m-input');
        const gInput = document.getElementById('g-input');
        const seal = document.getElementById('save-seal');

        // 更新日期
        document.getElementById('date').innerText = new Date().toLocaleDateString('zh-TW', {
            year: 'numeric', month: 'long', day: 'numeric', weekday: 'narrow'
        });

        // 載入資料
        window.onload = () => {
            const data = JSON.parse(localStorage.getItem('manifest_v2') || '{}');
            mInput.value = data.m || "";
            gInput.value = data.g || "";
        };

        // 儲存函數
        function save() {
            const data = { m: mInput.value, g: gInput.value };
            localStorage.setItem('manifest_v2', JSON.stringify(data));
            
            // 觸發印章動畫
            seal.classList.remove('opacity-0', 'stamped');
            void seal.offsetWidth; // 重新觸發 CSS 動畫
            seal.classList.add('stamped');

            if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
            
            setTimeout(() => {
                seal.classList.add('opacity-0');
            }, 3000);
        }

        // 清除函數
        function clearAll() {
            if(confirm("確定要撕毀這兩頁重新開始嗎？")) {
                mInput.value = "";
                gInput.value = "";
                localStorage.removeItem('manifest_v2');
            }
        }

        // 智慧自動儲存 (防丟失)
        let timer;
        [mInput, gInput].forEach(el => {
            el.addEventListener('input', () => {
                clearTimeout(timer);
                timer = setTimeout(() => {
                    localStorage.setItem('manifest_v2', JSON.stringify({ m: mInput.value, g: gInput.value }));
                }, 2000);
            });
        });
    </script>
</body>
</html>
