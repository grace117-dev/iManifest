<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Align Journal | 心靈顯化手帳</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 引入手寫風格字體與襯線字體 */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;500&display=swap');
        
        :root {
            --paper-color: #fdfaf5; /* 奶油色紙張 */
            --line-color: #e0d7c6; /* 橫格線顏色 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #e5e1d7; /* 桌子背景色 */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFkNfX58RygALMDIwMAAVAgA4SQUC5A76HAAAAABJRU5ErkJggg=='); /* 輕微木紋質感 */
        }

        /* 日誌本外殼 */
        .journal-cover {
            background-color: #4b5563; /* 深灰色外殼 */
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 15px rgba(0,0,0,0.1) inset;
            padding: 20px;
            position: relative;
        }

        /* 書籤絲帶 */
        .journal-cover::before {
            content: '';
            position: absolute;
            top: -10px;
            right: 50px;
            width: 20px;
            height: 100px;
            background-color: #be123c; /* 玫瑰紅絲帶 */
            border-radius: 0 0 5px 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* 日誌本內頁容器 */
        .journal-pages {
            background-color: var(--paper-color);
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            min-height: 80vh;
            position: relative;
        }

        /* 中間裝訂線/活頁孔模擬 */
        .journal-spine {
            width: 40px;
            background: linear-gradient(to right, rgba(0,0,0,0.05), rgba(0,0,0,0) 10%, rgba(0,0,0,0) 90%, rgba(0,0,0,0.05));
            position: relative;
            border-left: 1px solid rgba(0,0,0,0.02);
            border-right: 1px solid rgba(0,0,0,0.02);
        }

        .journal-spine::after {
            content: '○○○○○○○○○○○○○○○';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0,0,0,0.1);
            font-size: 18px;
            line-height: 2.5;
            letter-spacing: 2px;
            text-align: center;
            height: calc(100% - 40px);
            overflow: hidden;
        }

        /* 單個頁面 */
        .journal-page {
            flex: 1;
            padding: 40px;
            position: relative;
        }

        /* 模擬橫格線與手寫字體 */
        .ruled-textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            resize: none;
            /* 英文字體使用 Caveat (手寫風), 中文使用 Noto Serif TC */
            font-family: 'Caveat', 'Noto Serif TC', serif;
            font-size: 20px;
            line-height: 32px; /* 必須與 background-size 匹配 */
            color: #4a4130;
            outline: none !important;
            padding: 0;
            
            /* 橫格線生成技巧 */
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 32px; /* 32px 是一行的高度 */
            background-attachment: local;
            background-position: 0 31px;
        }

        textarea::placeholder {
            color: #c9c1af;
            font-style: italic;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 16px;
        }

        /* 響應式：手機上只顯示一面，並取消外殼 */
        @media (max-width: 1024px) {
            .journal-cover { padding: 0; background: transparent; box-shadow: none; }
            .journal-pages { flex-direction: column; min-height: 100vh; }
            .journal-spine { width: 100%; height: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.05), transparent); }
            .journal-spine::after { content: ''; }
            .journal-page { padding: 25px; }
            .journal-cover::before { display: none; } /* 隱藏絲帶 */
        }
    </style>
</head>
<body class="p-4 md:p-10 flex justify-center items-center min-h-screen">

    <div class="w-full max-w-7xl journal-cover">
        
        <header class="flex justify-between items-center mb-6 px-4">
            <div class="flex items-center gap-3">
                <i data-lucide="compass" class="text-white w-7 h-7"></i>
                <h1 class="text-2xl font-bold text-white tracking-tight font-serif">心靈手帳</h1>
                <span id="date-display" class="text-slate-300 ml-4 font-mono text-sm"></span>
            </div>
            <div class="flex gap-3">
                <button onclick="clearData()" class="px-4 py-2 text-slate-300 hover:text-white rounded-lg text-sm flex items-center gap-1.5 transition-colors">
                    <i data-lucide="trash-2" size="14"></i> 重置頁面
                </button>
                <button onclick="saveData()" class="px-6 py-2.5 bg-rose-700 hover:bg-rose-800 text-white rounded-lg shadow-md transition-all font-bold text-sm flex items-center gap-2 active:scale-95">
                    <i data-lucide="pen-tool" size="16"></i> 閤上手帳並儲存
                </button>
            </div>
        </header>

        <div class="journal-pages">
            
            <div class="journal-page border-r border-slate-100/50">
                <div class="flex items-center gap-3 mb-6 pb-2 border-b-2 border-slate-200">
                    <i data-lucide="zap" class="text-amber-600 w-5 h-5"></i>
                    <h2 class="text-xl font-bold text-slate-800 font-serif">今日核心意圖 (我已擁有...)</h2>
                    <span class="ml-auto text-xs text-slate-400 font-mono">PAGE 1</span>
                </div>
                <div class="h-[calc(100%-60px)]">
                    <textarea id="manifest" class="ruled-textarea" 
                        placeholder="詳細描述你理想的生活狀態，像是它已經發生了一樣。感受那種震動..."></textarea>
                </div>
            </div>

            <div class="journal-spine"></div>

            <div class="journal-page">
                <div class="flex items-center gap-3 mb-6 pb-2 border-b-2 border-slate-200">
                    <i data-lucide="heart" class="text-rose-600 w-5 h-5"></i>
                    <h2 class="text-xl font-bold text-slate-800 font-serif">豐盛感謝清單 (高頻對頻)</h2>
                    <span class="ml-auto text-xs text-slate-400 font-mono">PAGE 2</span>
                </div>
                <div class="h-[calc(100%-60px)]">
                    <textarea id="gratitude" class="ruled-textarea" 
                        placeholder="寫下今天讓你感到滿足、快樂、感恩的幾件事。保持輕盈的心情..."></textarea>
                </div>
            </div>

        </div>

        <footer class="mt-4 text-center text-[11px] text-slate-500 font-mono uppercase tracking-widest">
            Align Journal Suite - Skeuomorphic Edition v1.0
        </footer>
    </div>

    <script>
        lucide.createIcons();

        // 顯示日期 (模擬手寫日期)
        const now = new Date();
        document.getElementById('date-display').innerText = now.toLocaleDateString('en-US', { 
            year: 'numeric', month: '2-digit', day: '2-digit'
        });

        const mInput = document.getElementById('manifest');
        const gInput = document.getElementById('gratitude');

        // 讀取
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('align_journal_data') || '{}');
            mInput.value = saved.m || "";
            gInput.value = saved.g || "";
        };

        // 儲存
        function saveData() {
            const data = { m: mInput.value, g: gInput.value, time: new Date().getTime() };
            localStorage.setItem('align_journal_data', JSON.stringify(data));
            
            // 模擬「閤上手帳」的視覺反饋
            const btn = event.currentTarget;
            btn.innerHTML = `<i data-lucide="lock" size="16"></i> 已封存頻率`;
            btn.classList.replace('bg-rose-700', 'bg-green-700');
            lucide.createIcons();

            setTimeout(() => {
                btn.innerHTML = `<i data-lucide="pen-tool" size="16"></i> 閤上手帳並儲存`;
                btn.classList.replace('bg-green-700', 'bg-rose-700');
                lucide.createIcons();
            }, 2500);
        }

        // 清除
        function clearData() {
            if(confirm("確定要撕掉今天的頁面重寫嗎？")) {
                mInput.value = "";
                gInput.value = "";
                localStorage.removeItem('align_journal_data');
            }
        }
    </script>
</body>
</html>
