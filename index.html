<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Align Web | 專業顯化管理系統</title>
    
    <!-- Tailwind & Lucide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Noto+Sans+TC:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
            background-color: #fcfcfd;
        }

        .web-sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid #f1f1f4;
            background: white;
        }

        .main-content {
            margin-left: 260px;
            padding: 40px;
            min-height: 100vh;
        }

        /* 響應式調整：小螢幕時取消側邊欄固定 */
        @media (max-width: 768px) {
            .web-sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #f1f1f4;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }

        .glass-input {
            background: white;
            border: 1px solid #eef0f2;
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .glass-input:focus-within {
            border-color: #6366f1;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.08);
        }
    </style>
</head>
<body class="text-slate-700">

    <!-- 側邊導覽欄 -->
    <aside class="web-sidebar flex flex-col p-6">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="p-2 bg-indigo-600 rounded-lg shadow-lg shadow-indigo-200">
                <i data-lucide="compass" class="text-white w-5 h-5"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-900">Align Web</span>
        </div>

        <nav class="flex-1 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-indigo-50 text-indigo-600 rounded-xl font-semibold">
                <i data-lucide="layout-dashboard" size="18"></i> 每日工作台
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-50 hover:text-slate-600 rounded-xl transition-all">
                <i data-lucide="history" size="18"></i> 歷史紀錄
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-50 hover:text-slate-600 rounded-xl transition-all">
                <i data-lucide="settings" size="18"></i> 系統設定
            </a>
        </nav>

        <div class="mt-auto p-4 bg-slate-50 rounded-2xl border border-slate-100">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">今日語錄</p>
            <p class="text-xs text-slate-500 italic leading-relaxed">"你關注什麼，什麼就增長。"</p>
        </div>
    </aside>

    <!-- 主要內容區 -->
    <main class="main-content">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">顯化工作台</h2>
                <p id="full-date" class="text-slate-400 mt-1"></p>
            </div>
            <div class="flex gap-3">
                <button onclick="clearData()" class="px-5 py-2.5 text-slate-500 hover:bg-slate-100 rounded-xl transition-all font-medium text-sm flex items-center gap-2">
                    <i data-lucide="trash-2" size="16"></i> 重置
                </button>
                <button onclick="saveData()" class="px-8 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-lg shadow-indigo-100 transition-all font-bold text-sm flex items-center gap-2">
                    <i data-lucide="save" size="16"></i> 儲存今日頻率
                </button>
            </div>
        </header>

        <!-- 網頁版多欄佈局 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- 意圖區 -->
            <section class="space-y-4">
                <div class="flex justify-between items-center px-1">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="sparkles" class="text-yellow-500" size="18"></i> 核心意圖
                    </h3>
                    <span class="text-[10px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded uppercase font-bold">Scripting</span>
                </div>
                <div class="glass-input p-6">
                    <textarea id="manifest" 
                        class="w-full h-[400px] bg-transparent border-none focus:ring-0 text-slate-700 leading-relaxed resize-none text-lg"
                        placeholder="詳細描述你理想的生活狀態，像是它已經發生了一樣..."></textarea>
                </div>
            </section>

            <!-- 感謝與豐盛區 -->
            <section class="space-y-4">
                <div class="flex justify-between items-center px-1">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="heart" class="text-rose-500" size="18"></i> 豐盛感謝
                    </h3>
                    <span class="text-[10px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded uppercase font-bold">Gratitude</span>
                </div>
                <div class="glass-input p-6">
                    <textarea id="gratitude" 
                        class="w-full h-[400px] bg-transparent border-none focus:ring-0 text-slate-700 leading-relaxed resize-none text-lg"
                        placeholder="寫下今天讓你感到滿足的 3-5 件事..."></textarea>
                </div>
            </section>

        </div>

        <!-- 底部狀態欄 -->
        <div class="mt-10 pt-6 border-t border-slate-100 flex justify-between items-center text-xs text-slate-400 font-medium">
            <div class="flex items-center gap-4">
                <span class="flex items-center gap-1"><i data-lucide="check-circle" size="12" class="text-green-500"></i> 本地存儲已啟用</span>
                <span class="flex items-center gap-1"><i data-lucide="shield-check" size="12"></i> 隱私保護 (端對端)</span>
            </div>
            <p>© 2026 Align Personal Manifestation Suite</p>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // 日期顯示
        const now = new Date();
        document.getElementById('full-date').innerText = now.toLocaleDateString('zh-TW', { 
            year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' 
        });

        const mInput = document.getElementById('manifest');
        const gInput = document.getElementById('gratitude');

        // 讀取
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('align_web_data') || '{}');
            mInput.value = saved.m || "";
            gInput.value = saved.g || "";
        };

        // 儲存
        function saveData() {
            const data = { m: mInput.value, g: gInput.value, lastSave: new Date().toISOString() };
            localStorage.setItem('align_web_data', JSON.stringify(data));
            
            // 簡單的成功通知
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check" size="16"></i> 已同步至宇宙`;
            btn.classList.replace('bg-indigo-600', 'bg-green-600');
            lucide.createIcons();

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-green-600', 'bg-indigo-600');
                lucide.createIcons();
            }, 2000);
        }

        // 清除
        function clearData() {
            if(confirm("確定要重置所有內容嗎？")) {
                mInput.value = "";
                gInput.value = "";
                localStorage.removeItem('align_web_data');
            }
        }
    </script>
</body>
</html>
